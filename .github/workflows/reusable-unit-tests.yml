name: Reusable unit tests
on:
  workflow_call:
    inputs:
      python-version:
        type: string
        default: "3.12"
        required: false
    secrets:
      CODECOV_TOKEN:
        required: true
jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v6

      - name: Setup python environment
        uses: actions/setup-python@v5

      - name: Install python dependencies
        run: python3 -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Run Python Pytest Unit Tests
        run: python3 -m pytest --cov=sw_operator --cov-report=xml

      - name: Upload coverage Report
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Static Code Analysis
        run: echo "Running static code analysis ..."
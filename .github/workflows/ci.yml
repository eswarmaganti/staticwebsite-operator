name: CI Pipeline to build StaticWebsite Operator Image
run-name: Building the ${{ github.repository }} by ${{ github.actor }}
on: [push]
#  push:
#    branches:
#      - main
jobs:
  CI:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6
      - name: Perform Unit Tests
        run: echo "Running Unit Tests"
      - name: Static Code Analysis
        run: echo "Running Static Code Analysis"
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ github.actor }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - run: echo "Successfully logged into to Docker Hub"
      - name: Build the image & Push to DockerHub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: docker.io/${{ github.repository_owner }}/${{ var.IMAGE_NAME }}:${{ github.run_number }}
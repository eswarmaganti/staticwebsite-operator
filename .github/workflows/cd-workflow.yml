name: cd-workflow
run-name: Operator deployment triggered by ${{ github.actor }}
on:
  workflow_run:
    workflows:
      - ci-build
    branches:
      - main
    types:
      - completed
jobs:
  CD:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted
    steps:
      - name: Checkout the code
        uses: actions/checkout@v6

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Set kubeconfig
        run: |
          echo "Setting up the kubeconfig"
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy the Kubernetes Secret
        run: |
          kubectl create secret docker-registry staticwebsite-operator \
            --docker-username=${{ vars.DOCKERHUB_USERNAME }} \
            --docker-password=${{secrets.DOCKERHUB_TOKEN}} \
            --docker-server=https://index.docker.io/v1/ \
            --namespace=sw-operator-system \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy the operator
        run: |
          echo "Applying the operator CRD manifest"
          kubectl apply -f kubernetes/crd/
          
          echo "Applying the kubernetes RBAC manifests"
          kubectl apply -f kubernetes/rbac/
          
          echo "Applying the operator deployment manifest"
          kubectl apply -f kubernetes/deployment/
          
          
          
          

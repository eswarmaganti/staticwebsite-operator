name: ci-build
run-name: Building the ${{ github.repository }} by ${{ github.actor }}
on:
  push:
    branches:
      - main
jobs:
  test:
    uses: ./.github/workflows/reusable-unit-tests.yml
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build-scan-push:
    runs-on: ubuntu-latest
    needs: test                                 # run the job when test job is successful
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ github.actor }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - run: echo "Successfully logged into to Docker Hub"

      - name: Build the image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          platforms: linux/amd64
          tags: docker.io/${{ github.repository_owner }}/${{ vars.IMAGE_NAME }}:${{github.run_number}}

      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: docker.io/${{ github.repository_owner }}/${{ vars.IMAGE_NAME }}:${{github.run_number}}
          exit-code: "1"
          format: "table"
          severity: "CRITICAL,HIGH"

      - name: Build the image & Push to DockerHub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/arm64, linux/amd64
          tags: |
            docker.io/${{ github.repository_owner }}/${{ vars.IMAGE_NAME }}:${{ github.run_number }}
            docker.io/${{ github.repository_owner }}/${{ vars.IMAGE_NAME }}:latest
name: ci-build
run-name: Building the ${{ github.repository }} by ${{ github.actor }}
on:
  push:
    branches:
      - main
jobs:
  CI-Build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6

      - name: Setup Python Environment
        uses: actions/setup-python@v5

      - name: Install the python dependencies
        run: |
          python3 -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Run Python Unit Tests
        run: python3 -m pytest --cov=sw_operator --cov-report=xml

      - name: Test Coverage Badge
        uses: codecov/codecov-action@v4
        with:
          token: ${{secrets.CODECOV_TOKEN}}

      - name: Static Code Analysis
        run: echo "Running Static Code Analysis"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ github.actor }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - run: echo "Successfully logged into to Docker Hub"

      - name: Build the image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          platforms: linux/arm64, linux/amd64
          tags: docker.io/${{ github.repository_owner }}/${{ vars.IMAGE_NAME }}:${{github.run_number}}

      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: docker.io/${{ github.repository_owner }}/${{ vars.IMAGE_NAME }}:${{github.run_number}}
          exit-code: "1"
          format: "table"
          severity: "CRITICAL,HIGH"

      - name: Build the image & Push to DockerHub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/arm64, linux/amd64
          tags: |
            docker.io/${{ github.repository_owner }}/${{ vars.IMAGE_NAME }}:${{ github.run_number }}
            docker.io/${{ github.repository_owner }}/${{ vars.IMAGE_NAME }}:latest
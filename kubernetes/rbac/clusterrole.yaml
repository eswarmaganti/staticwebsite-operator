#
# ClusterRole to manager the permissions for staticwebsite operator
#
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: staticwebsite-operator
  labels:
    app.kubernetes.io/name: staticwebsite-operator
    app.kubernetes.io/version: v1alpha1
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/part-of: staticwebsite-platform
    app.kubernetes.io/component: controller
rules:
  # Watch and patch StaticWebsite CRs — core operator permissions
  - apiGroups: [ "platform.eswar.dev" ]
    resources: [ "staticwebsites" ]
    verbs: [ "get", "list", "watch", "patch", "update", "delete" ]

  ## Patch the CR's status subresource independently
  - apiGroups: [ "platform.eswar.dev" ]
    resources: [ "staticwebsites/status" ]
    verbs: [ "get", "patch", "update"]

  # Manage finalizers on the CR
  - apiGroups: [ "platform.eswar.dev" ]
    resources: [ "staticwebsites/finalizers" ]
    verbs: [ "update" ]

  # Full CRUD on child resources the operator provisions
  - apiGroups: [ "apps" ]
    resources: [ "deployments" ]
    verbs: [ "get", "list", "watch", "create", "update", "patch", "delete" ]

  - apiGroups: [ "" ]
    resources: [ "services" ]
    verbs: [ "get", "list", "watch", "create", "update", "patch", "delete" ]

  - apiGroups: [ "gateway.networking.k8s.io" ]
    resources: [ "gateways", "httproutes" ]
    verbs: [ "get", "list", "watch", "create", "update", "patch", "delete" ]

  # Post Kubernetes Events (visible in kubectl describe)
  - apiGroups: [ "" ]
    resources: [ "events" ]
    verbs: [ "create", "patch" ]

  # Kopf discovers and validates your CRD schema at startup
  - apiGroups: [ "apiextensions.k8s.io" ]
    resources: [ "customresourcedefinitions" ]
    verbs: [ "get", "list", "watch" ]

  # Kopf uses Leases for leader election when multiple replicas run
  - apiGroups: [ "coordination.k8s.io" ]
    resources: [ "leases" ]
    verbs: [ "get", "list", "watch", "create", "update", "patch", "delete" ]
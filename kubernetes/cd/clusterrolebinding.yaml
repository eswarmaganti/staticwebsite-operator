#
# The cluster role binding used to bind the cluster role and service account to grant the permissions to manage the resources
#
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: github-actions-cd
  labels:
    app.kubernetes.io/name: github-actions-cd
    app.kubernetes.io/component: cd-pipeline
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: github-actions-cd
subjects:
  - kind: ServiceAccount
    name: github-actions-cd
    namespace: staticwebsite-operator
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: staticwebsites.platform.eswar.dev
spec:
  group: platform.eswar.dev
  scope: Namespaced
  names:
    kind: StaticWebsite
    plural: staticwebsites
    shortNames:
      - sw
    singular: staticwebsite
  versions:
    - name: v1alpha1
      served: true
      storage: true

      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                image:
                  type: string
                replicas:
                  type: integer
                  minimum: 1
                  maximum: 10
                domain:
                  type: string
                port:
                  type: integer
                  minimum: 1
                  maximum: 65535
                targetPort:
                  type: integer
                  minimum: 1
                  maximum: 65535
                resources:
                  type: object
                  properties:
                    requests:
                      type: object
                      properties:
                        cpu:
                          type: string
                        memory:
                          type: string
                      required:
                        - cpu
                        - memory
                    limits:
                      type: object
                      properties:
                        cpu:
                          type: string
                        memory:
                          type: string
                      required:
                        - cpu
                        - memory
              required:
                - image
                - replicas
                - port
                - targetPort
                - domain
            status:
              type: object
              properties:
                phase:
                  type: string
                deploymentName:
                  type: string
                serviceName:
                  type: string
                replicas:
                  type: integer
                availableReplicas:
                  type: integer
                readyReplicas:
                  type: integer
      additionalPrinterColumns:
        - name: Image
          type: string
          jsonPath: .spec.image
        - name: Replicas
          type: integer
          jsonPath: .status.readyReplicas
        - name: Domain
          type: string
          jsonPath: .spec.domain
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp